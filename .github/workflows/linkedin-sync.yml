name: RPA LinkedIn Sync

on:
  schedule:
    # Esegue l'automazione ogni giorno a mezzanotte (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Permette di avviarlo anche manualmente dal pannello GitHub Actions

permissions:
  contents: write # Serve per poter fare il commit sul repo

jobs:
  sync-linkedin:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout del codice
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installazione dipendenze
        run: npm ci

      - name: 🌐 Installazione browser Playwright
        run: npx playwright install chromium

      - name: 🤖 Esecuzione Agent RPA
        run: npm run sync-linkedin
        # Nota: su Github Actions l'RPA deve girare in modalità headless.
        # LinkedIn potrebbe bloccare l'IP di Github. È consigliato passare i cookie di sessione come Secret.
        env:
          LINKEDIN_LI_AT_COOKIE: ${{ secrets.LINKEDIN_LI_AT_COOKIE }}

      - name: 📤 Commit e Push se ci sono aggiornamenti
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/profile.json
          
          # Fai il commit solo se il file profile.json è cambiato
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 auto-update: sincronizzato profilo LinkedIn tramite RPA" && git push)

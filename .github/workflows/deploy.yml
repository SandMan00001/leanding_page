# GitHub Actions CI/CD Pipeline
# Automated Build and Deploy to GitHub Pages (Custom Domain Compatible)

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers the pipeline when pushing to the main branch

permissions:
  contents: write # Required to allow writing/deploying to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Enables automatic caching of npm dependencies

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The directory where Vite compiles the production build
          branch: gh-pages # The target branch for GitHub Pages hosting
          clean: true # Automatically removes obsolete files from the target branch
